<!DOCTYPE html>
<html>
<head>
    <title>✅ Member Form Check</title>
    <style>body{font-family:monospace;background:#000;color:#0f0;padding:20px;margin:0}</style>
</head>
<body>
    <h1>✅ Member Account System Verification</h1>
    <p>Checking if member form HTML is in app.html...</p>
    <div id="result"></div>
    
    <script>
        (async () => {
            try {
                const response = await fetch('app.html?t=' + new Date().getTime());
                const html = await response.text();
                
                const checks = {
                    'Member form element': html.includes('id="auth-member-form"'),
                    'Email input field': html.includes('id="auth-member-email"'),
                    'Password input field': html.includes('id="auth-member-password"'),
                    'Login button': html.includes('id="auth-member-login-btn"'),
                    'Toggle button': html.includes('id="auth-member-toggle-btn"'),
                    'Role picker modal': html.includes('id="role-picker-modal"'),
                    'Display name field (signup)': html.includes('id="auth-member-name"'),
                    'Forced visibility CSS': html.includes('display:block !important'),
                    'Pink background color': html.includes('rgba(255,68,68')
                };
                
                let allPass = true;
                let result = '<h2>Results:</h2>';
                for (const [name, passed] of Object.entries(checks)) {
                    result += `<p style="color:${passed ? '#0f0' : '#f00'}">${passed ? '✅' : '❌'} ${name}</p>`;
                    if (!passed) allPass = false;
                }
                
                result += '<hr>';
                if (allPass) {
                    result += '<h3 style="color:#0f0">✅ SUCCESS! Member form HTML is in app.html</h3>';
                    result += '<p>Now do this:</p>';
                    result += '<ol>';
                    result += '<li>Press Ctrl+Shift+R (or Cmd+Shift+R on Mac) in app.html</li>';
                    result += '<li>Member Account panel should appear with pink background</li>';
                    result += '<li>Try clicking "New member? Register"</li>';
                    result += '</ol>';
                } else {
                    result += '<h3 style="color:#f00">❌ ISSUE: Some components missing</h3>';
                }
                
                document.getElementById('result').innerHTML = result;
            } catch (e) {
                document.getElementById('result').innerHTML = `<p style="color:#f00">Error: ${e.message}</p>`;
            }
        })();
    </script>
</body>
</html>
